```html
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KrishiLink | Crop Recommendation System</title>

    <link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>🌱 KrishiLink</h1>

        <p class="subtitle">
            AI Powered Crop Recommendation System
        </p>

        <form method="POST" action="/">

            <div class="input-group">

                <label>Nitrogen (N)</label>
                <input
                    type="number"
                    name="N"
                    placeholder="Enter Nitrogen value"
                    required
                >

            </div>

            <div class="input-group">

                <label>Phosphorus (P)</label>
                <input
                    type="number"
                    name="P"
                    placeholder="Enter Phosphorus value"
                    required
                >

            </div>

            <div class="input-group">

                <label>Potassium (K)</label>
                <input
                    type="number"
                    name="K"
                    placeholder="Enter Potassium value"
                    required
                >

            </div>

            <div class="input-group">

                <label>Temperature (°C)</label>
                <input
                    type="number"
                    step="0.01"
                    name="temperature"
                    placeholder="Temperature"
                    required
                >

            </div>

            <div class="input-group">

                <label>Humidity (%)</label>
                <input
                    type="number"
                    step="0.01"
                    name="humidity"
                    placeholder="Humidity"
                    required
                >

            </div>

            <div class="input-group">

                <label>Soil pH</label>
                <input
                    type="number"
                    step="0.01"
                    name="ph"
                    placeholder="Soil pH"
                    required
                >

            </div>

            <div class="input-group">

                <label>Rainfall (mm)</label>
                <input
                    type="number"
                    step="0.01"
                    name="rainfall"
                    placeholder="Rainfall"
                    required
                >

            </div>

            <button class="predict-btn" type="submit">
                Predict Crop
            </button>

        </form>

        <form action="/train" method="GET">

            <button class="train-btn" type="submit">
                Retrain Model
            </button>

        </form>

        {% if prediction %}

        <div class="prediction-box">

            <h2>🌾 Recommended Crop</h2>

            <h1>{{ prediction }}</h1>

        </div>

        {% endif %}

        {% if error %}

        <div class="error-box">

            <h3>{{ error }}</h3>

        </div>

        {% endif %}

    </div>

</div>

</body>

</html>
```
